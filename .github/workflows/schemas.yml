name: Publish schemas

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

concurrency:
  # Only one publication at a time; queue rather than cancel, so a
  # late main push doesn't race an earlier one.
  group: schemas-publish
  cancel-in-progress: false

# peaceiris/actions-gh-pages commits to the gh-pages branch, so
# the workflow needs write access to repository contents.
permissions:
  contents: write

jobs:
  publish:
    name: Publish schemas to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Fetch spec.json from RTM
        env:
          RTM_API_KEY: ${{ secrets.RTM_API_KEY }}
          RTM_API_SECRET: ${{ secrets.RTM_API_SECRET }}
        run: make spec

      - name: Generate schemas
        run: go generate ./internal/rtm/schemas/...

      - name: Read schema major version
        id: version
        run: |
          major=$(cat internal/rtm/schemas/VERSION | tr -d '[:space:]')
          if ! [[ "$major" =~ ^[0-9]+$ ]]; then
            echo "::error::Unexpected VERSION contents: $major"
            exit 1
          fi
          echo "major=$major" >> "$GITHUB_OUTPUT"

      # peaceiris/actions-gh-pages handles branch bootstrap, auth,
      # and orphan-branch semantics. `keep_files: true` preserves
      # older `schemas/v<N>/` subdirectories so historical
      # contracts stay resolvable; `destination_dir` scopes the
      # current publish to this schema major only.
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./internal/rtm/schemas
          destination_dir: schemas/v${{ steps.version.outputs.major }}
          exclude_assets: 'VERSION,gen.go,schemas.go'
          keep_files: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "Publish schemas v${{ steps.version.outputs.major }} from ${{ github.sha }}"
